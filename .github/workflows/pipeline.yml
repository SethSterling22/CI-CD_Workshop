name: CI/CD Workshop Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # FASE 1: Integración Continua (Linting y Pruebas)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install flake8
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

      - name: Lint con flake8 (Calidad de código)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # FASE 2: Entrega Continua (Build de Docker y Push)
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/workshop-app:latest

  # FASE 3: Despliegue Continuo (Opcional - Render)
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}

  # SECCIÓN OPCIONAL: Notificaciones (Solo si falla o termina)
  notifications:
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Reporte de Estado
        run: |
          echo "El workflow ha terminado con estado: ${{ job.status }}"
          # Aquí se podría integrar un envío de email o webhook de Slack



