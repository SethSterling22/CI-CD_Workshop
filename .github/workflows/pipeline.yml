name: CI/CD Workshop GHCR

on:
  push:
    branches: [ main ]

# Permisos necesarios para escribir en GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  # FASE 1: Calidad de Código
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install flake8 && flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # FASE 2: Build y Push a GitHub Packages
  build-and-push:
    needs: linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # El nombre de la imagen debe ser en minúsculas
          tags: ghcr.io/${{ github.repository_owner }}/taller-cicd:latest

  # FASE 3: Despliegue (Opcional)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy
        run: echo "Aquí conectarías con tu servicio de hosting (Render/Railway/etc)"
        # curl ${{ secrets.DEPLOY_HOOK }}

  # SECCIÓN OPCIONAL: Reporte de Errores (Solo si algo falla)
  error-report:
    if: failure()
    needs: [linting, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Send Error Notification
        run: echo "¡Atención! El pipeline falló en alguna fase. Revisar logs."